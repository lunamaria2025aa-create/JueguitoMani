<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Atrapa los Deseos ✨</title>
    <style>
        body, html { 
            margin: 0; padding: 0; 
            width: 100%; height: 100%; 
            overflow: hidden; 
            font-family: 'Georgia', serif;
        }

        /* RECUPERAMOS TU FONDO */
        #game-container { 
            width: 100vw; height: 100vh; 
            background-image: url('image_9.png'); 
            background-size: cover; 
            background-position: center; 
            position: relative; 
            cursor: none; 
        }

        /* MUÑEQUITA MÁS GRANDE (Acomodado el tamaño) */
        #player { 
            width: 250px; /* Tamaño mucho más visible */
            height: 280px; 
            position: absolute; 
            bottom: 20px; 
            left: 50%; 
            transform: translateX(-50%); 
            z-index: 20; 
        }

        #player-basket { 
            width: 100%; height: 100%; 
            background-image: url('image_5.png'); 
            background-size: contain; 
            background-repeat: no-repeat; 
            background-position: bottom center;
            position: absolute; 
        }

        #player-thanks { 
            width: 100%; height: 100%; 
            background-image: url('image_6.png'); 
            background-size: contain; 
            background-repeat: no-repeat; 
            background-position: bottom center;
            position: absolute; 
            opacity: 0; 
            transition: opacity 0.5s; 
        }

        .wish { position: absolute; font-size: 35px; z-index: 5; }

        #ui { 
            position: absolute; top: 20px; left: 20px; 
            background: rgba(255, 255, 255, 0.9); 
            padding: 12px 25px; 
            border-radius: 25px; 
            box-shadow: 0 4px 15px rgba(0,0,0,0.1); 
            color: #555;
            z-index: 100;
        }

        #final-popup { 
            display: none; position: absolute; 
            top: 50%; left: 50%; transform: translate(-50%, -50%); 
            background: white; padding: 35px; 
            border-radius: 25px; text-align: center; 
            z-index: 1000; border: 5px solid #ffafbd; 
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }

        .win #player-basket { opacity: 0; }
        .win #player-thanks { opacity: 1; }

        /* Botón de inicio necesario para la música */
        #start-screen {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(255, 175, 189, 0.9);
            display: flex; justify-content: center; align-items: center;
            z-index: 2000;
        }
        #btn-play {
            padding: 20px 50px; font-size: 24px; cursor: pointer;
            border: none; border-radius: 50px; background: white;
            color: #ffafbd; font-weight: bold; box-shadow: 0 10px 20px rgba(0,0,0,0.1);
        }
    </style>
</head>
<body>

<div id="start-screen">
    <button id="btn-play">¡Empezar Juego! ✨</button>
</div>

<div id="game-container">
    <div id="ui">Estrellas: <span id="score">0</span> / 10</div>
    <div id="player">
        <div id="player-basket"></div>
        <div id="player-thanks"></div>
    </div>
    <div id="final-popup">
        <h2>¡Lo logramos! ✨</h2>
        <p>Hicimos un gran equipo, gracias por ayudarme.</p>
    </div>
</div>

<audio id="music" loop>
    <source src="https://www.chosic.com/wp-content/uploads/2021/04/Kawaii-Adventures.mp3" type="audio/mp3">
</audio>
<audio id="sound-catch">
    <source src="https://assets.mixkit.co/active_storage/sfx/2013/2013-preview.mp3" type="audio/mp3">
</audio>

<script>
    const container = document.getElementById('game-container');
    const player = document.getElementById('player');
    const scoreVal = document.getElementById('score');
    const popup = document.getElementById('final-popup');
    const music = document.getElementById('music');
    const soundCatch = document.getElementById('sound-catch');
    const startScreen = document.getElementById('start-screen');
    const btnPlay = document.getElementById('btn-play');

    let score = 0; let active = false;

    btnPlay.addEventListener('click', () => {
        startScreen.style.display = 'none';
        active = true;
        music.play();
        music.volume = 0.2;
    });

    container.addEventListener('mousemove', (e) => { 
        if (!active) return; 
        player.style.left = e.clientX + 'px'; 
    });

    function createItem() {
        if (!active) return;
        const item = document.createElement('div');
        item.className = 'wish';
        item.innerHTML = Math.random() > 0.5 ? '⭐' : '💖';
        item.style.left = Math.random() * (window.innerWidth - 50) + 'px';
        item.style.top = '-50px';
        container.appendChild(item);

        let topPos = -50;
        function drop() {
            if (!active && score < 10) { item.remove(); return; }
            topPos += 4; item.style.top = topPos + 'px';
            
            const pRect = player.getBoundingClientRect();
            const iRect = item.getBoundingClientRect();

            if (iRect.bottom > pRect.top + 20 && iRect.top < pRect.bottom && iRect.right > pRect.left && iRect.left < pRect.right) {
                score++;
                scoreVal.innerText = score;
                item.remove();
                
                // Sonido lindo al atrapar
                soundCatch.currentTime = 0;
                soundCatch.play();

                if (score >= 10) {
                    active = false;
                    document.body.classList.add('win');
                    popup.style.display = 'block';
                }
                return;
            }
            if (topPos < window.innerHeight) requestAnimationFrame(drop);
            else item.remove();
        }
        drop();
    }

    setInterval(createItem, 900);
</script>
</body>
</html>
